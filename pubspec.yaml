name: bajetku
description: A simple personal finance tracker app.
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.2.1
  path_provider: ^2.1.2

  # UI/Design
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  percent_indicator: ^4.2.3
  lucide_icons: ^0.257.0
  flame: ^1.35.1
  flame_forge2d: ^0.19.2+4
  sensors_plus: ^7.0.0
  forge2d: ^0.14.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
